default_config:
logger:
  default: info
  logs:
    homeassistant.components.onvif: info
    homeassistant.components.automation: debug
    custom_components.camera_record_services: debug
    homeassistant.components.binary_sensor: debug

automation: !include automations.yaml
template: !include templates.yaml

shell_command:
  delete_old_recordings: "echo \"--- $(date) Reolink ---\" >> /media/logs/ha_video_cleanup.log && find /media/cam -name '*.mp4' -mmin +1440 -delete -print >> /media/logs/ha_video_cleanup.log 2>&1"

homeassistant:
  allowlist_external_dirs:
    - /tmp
    - /config
