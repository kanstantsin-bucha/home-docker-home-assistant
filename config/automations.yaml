- id: '1779799375322'
  alias: Reolink Front Door Recording
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_door_person
    to: 'on'
  conditions: []
  actions:
  - action: telegram_bot.send_message
    target:
      entity_id: notify.skyline_home_kanstantsin
    data:
      message: 'Recording started: Front Door'
  - parallel:
    - action: camera_record_services.camera_start_recording
      data:
        entity_id: camera.front_door_clear
        filename: /media/cam/{{ now().strftime('%Y%m%d_%H-%M-%S') }}_front-door.mp4
        duration: 3600
        lookback: 5
        stop_state_id: binary_sensor.front_door_person_detection_delayed
        stop_state_value: 'off'
        extend_running_task: true
    - repeat:
        while:
        - condition: state
          entity_id: binary_sensor.front_door_person_detection_delayed
          state: 'on'
        sequence:
        - action: camera.snapshot
          data:
            filename: /config/front_door_snap.jpg
          target:
            entity_id: camera.front_door_fluent
        - action: telegram_bot.send_photo
          target:
            entity_id: notify.skyline_home_kanstantsin
          data:
            file: /config/front_door_snap.jpg
            entity_id:
            - notify.skyline_home_kanstantsin
            caption: front door
        - delay:
            seconds: 5
  mode: restart
